<!DOCTYPE html>
<html>
<head>
  <title>Courses</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .card {
      background: #1e293b;
      margin: 20px auto;
      padding: 20px;
      width: 300px;
      border-radius: 10px;
    }

    a {
      color: #3b82f6;
      text-decoration: none;
    }
  </style>

<script>
if (!localStorage.getItem("user")) {
  window.location.href = "login.html";
}
</script>

</head>
<body>

<h2 id="welcome"></h2>

<div class="card">
  <h3>AWS DevOps Course</h3>
  <p>Full Practical Training</p>
  <a href="course.html">Start Learning</a>
</div>

<button onclick="logout()">Logout</button>

<script>
document.getElementById("welcome").innerText =
  "Welcome " + localStorage.getItem("user");

function logout() {
  localStorage.removeItem("user");
  window.location.href = "login.html";
}
</script>

</body>
</html>
