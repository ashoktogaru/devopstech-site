<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial;
      padding-top: 100px;
    }

    .box {
      background: #1e293b;
      padding: 30px;
      width: 300px;
      margin: auto;
      border-radius: 10px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px 20px;
      background: #3b82f6;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Student Login</h2>

  <input type="text" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>

  <button onclick="login()">Login</button>
</div>

<script>
async function login() {
  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  let url = "https://script.google.com/macros/s/AKfycbzcE1C8W3652UgImvCFM8SyeEl3uRI1DmQTaXXDxa7B4HOOzobcan5pvrF_jW5ukqdpXA/exec" + email + "&password=" + password;

  try {
    let res = await fetch(url);
    let data = await res.text();

    console.log(data);

    if (data.trim() === "success") {
      localStorage.setItem("user", email);
      window.location.href = "courses.html";
    } else {
      alert("Invalid email or password");
    }

  } catch (err) {
    alert("Error connecting to server");
    console.log(err);
  }
}
</script>

</body>
</html>
