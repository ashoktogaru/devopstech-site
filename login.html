<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial;
      padding-top: 100px;
    }
    input {
      padding: 10px;
      margin: 10px;
    }
    button {
      padding: 10px 20px;
      background: #3b82f6;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

<h2>Student Login</h2>

<input type="text" id="email" placeholder="Email"><br>
<input type="password" id="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<script>
function login() {
  var email = document.getElementById("email").value;
  var password = document.getElementById("password").value;

  var url = "https://script.google.com/macros/s/AKfycbzcE1C8W3652UgImvCFM8SyeEl3uRI1DmQTaXXDxa7B4HOOzobcan5pvrF_jW5ukqdpXA/exec" + email + "&password=" + password;

  fetch(url)
    .then(res => res.text())
    .then(data => {
      if (data === "success") {
        localStorage.setItem("user", email);
        window.location.href = "courses.html";
      } else {
        alert("Invalid login");
      }
    });
}
</script>

</body>
</html>
